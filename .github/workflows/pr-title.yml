name: PR title

# The release workflow derives the version bump from Conventional Commit subjects.
# When a PR is squash-merged, GitHub uses the PR *title* as the squash commit
# subject — so a non-conventional PR title silently produces a release-invisible
# commit. This job makes that a review-time failure instead of a silent no-release.
#
# Implemented inline rather than via a third-party action: the rule is one regex,
# and this repo's supply-chain surface is not worth expanding for it.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  conventional:
    name: conventional commit subject
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          # type(optional-scope)optional-!: subject
          # Types mirror [tool.semantic_release.commit_parser_options].allowed_tags.
          pattern='^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert|security|deprecate)(\([a-z0-9._/-]+\))?!?: .+'

          if [[ ! "$TITLE" =~ $pattern ]]; then
            {
              echo "## PR title is not a Conventional Commit"
              echo
              echo '```'
              echo "$TITLE"
              echo '```'
              echo
              echo "Expected \`type(scope)?!?: subject\`, for example:"
              echo
              echo '- `feat(decomposition): wire the genus-DAG extractor into run_pipeline`'
              echo '- `fix(provenance): stop clobbering curator mint decisions on rerun`'
              echo '- `docs: record the most-specific filler policy`'
              echo '- `feat(api)!: drop the deprecated /concepts search shape`'
              echo
              echo "Bumping types: \`feat\` → minor, \`fix\`/\`perf\` → patch, \`!\` or a"
              echo "\`BREAKING CHANGE:\` footer → minor while pre-1.0 (see CONTRIBUTING)."
              echo "All other types land in the changelog without bumping the version."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=PR title is not a Conventional Commit::$TITLE"
            exit 1
          fi

          echo "OK: $TITLE"
