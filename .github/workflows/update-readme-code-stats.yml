---
name: Update README Code Stats

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-readme-code-stats-main
  cancel-in-progress: true

jobs:
  update-readme:
    name: Update README line-count table
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5.4.0
        with:
          python-version: '3.13'
      - name: Update README code stats
        run: python scripts/dev/update_readme_code_stats.py
      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README code line-count table"
          git push origin HEAD:main
