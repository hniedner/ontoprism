---
name: Update README Code Stats

on:
  push:
    branches: [main]

# Least privilege: default read-only; the commit-and-push job elevates to write.
permissions:
  contents: read

concurrency:
  group: update-readme-code-stats-main
  cancel-in-progress: true

jobs:
  update-readme:
    name: Update README line-count table
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit + push the regenerated README line-count table
    steps:
      - name: Checkout main branch
        # zizmor: ignore[artipacked] — this job commits + pushes the README update,
        # so it must keep the persisted token (persist-credentials cannot be false).
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
      - name: Update README code stats
        run: python scripts/dev/update_readme_code_stats.py
      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README code line-count table"
          git push origin HEAD:main
