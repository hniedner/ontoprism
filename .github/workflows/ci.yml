name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + types + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PDM
        run: pipx install pdm

      - name: Install dependencies
        run: pdm install --dev

      - name: Ruff (lint)
        run: pdm run ruff check .

      - name: Ruff (format check)
        run: pdm run ruff format --check .

      - name: basedpyright (types)
        run: pdm run basedpyright

      - name: Tests + coverage (excludes integration)
        run: pdm run test-ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  web:
    name: web (lint + check + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: svelte-check
        run: npm run check --if-present

      - name: Unit tests (vitest)
        run: npm run test:unit --if-present -- --run
