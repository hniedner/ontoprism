name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo (tests + coverage upload need no write
# scopes). Release/README workflows request their own write scopes explicitly.
permissions:
  contents: read

jobs:
  # Path filter so scoped PRs skip irrelevant job trees. Conservative: the heavy test
  # jobs also run unconditionally on push to main (post-merge full validation), and the
  # universal `quality` gate below is never skipped. (docker-build is the exception — it
  # is path-gated even on push, since it only needs to run when image inputs change.)
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'ontolib/**'
              - 'backend/**'
              - 'scripts/**'
              - 'migrations/**'
              - 'data/**'
              - 'conftest.py'
              - 'alembic.ini'
              - 'pyproject.toml'
              - 'pdm.lock'
              - '.pre-commit-config.yaml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            docker:
              # Image build inputs — catches bad FROM bumps / dependency-install breakage
              # that the test jobs can't (CI never builds the images otherwise).
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - 'pyproject.toml'
              - 'pdm.lock'
              - 'ontolib/pyproject.toml'
              - 'backend/pyproject.toml'
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
              - '.github/workflows/ci.yml'

  # Static quality gates — runs the SAME pre-commit hooks developers run locally, so
  # CI is parity, not the place issues are first discovered. Always runs (pre-commit's
  # generic hooks cover every file, incl. docs), so it is intentionally not path-gated.
  quality:
    name: quality (pre-commit parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          # Full history so the fallow hook can resolve origin/main as its audit base.
          fetch-depth: 0

      - name: Set up PDM (cached)
        uses: pdm-project/setup-pdm@973541a5febeafcfdadf8a51211435be6ecfd90f  # v4.5
        with:
          python-version: "3.13"
          cache: true

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: pdm install --dev

      - name: Install frontend deps (eslint/svelte-check hooks need node_modules)
        run: npm ci --prefix frontend

      - name: Run pre-commit (all files)
        run: pdm run pre-commit run --all-files --show-diff-on-failure

  backend-tests:
    name: backend tests
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up PDM (cached)
        uses: pdm-project/setup-pdm@973541a5febeafcfdadf8a51211435be6ecfd90f  # v4.5
        with:
          python-version: "3.13"
          cache: true

      - name: Install dependencies
        run: pdm install --dev

      - name: Run unit tests with coverage collection (no gate)
        # -n auto (xdist): the suite's stub HTTP servers require parallel workers;
        # pytest's serial global-capture teardown corrupts stdin fd (os.dup2 EBADF)
        # when run with -n 0, so we keep xdist. Coverage gate lives in coverage-verify.
        run: pdm run test-ci-no-gate

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-data
          # .coverage is a dotfile; upload-artifact@v4 excludes hidden files by default.
          include-hidden-files: true
          path: |
            .coverage
            coverage.xml

  coverage-verify:
    name: coverage verify (ontolib + backend)
    needs: [backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      # Only the coverage tool + the checked-out source are needed to gate — no full
      # project install. relative_files=true (pyproject) makes the artifact portable.
      - name: Install coverage
        run: pip install 'coverage>=7,<8'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-data

      - name: Verify ontolib coverage >= 90%
        run: coverage report --include='*ontolib/src/*' --fail-under=90

      - name: Verify backend coverage >= 90%
        run: coverage report --include='*backend/src/*' --fail-under=90

  web-tests:
    name: web tests + coverage
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

  # Behavioral integration tests against real services (Oxigraph + Postgres/pgvector),
  # seeded with a small deterministic fixture — honors DECISIONS D3. Build-pinned tests
  # (the 12.8M-triple universe / real generated embeddings) are marked `full_build` and
  # excluded here; they run locally against the pinned store.
  integration-tests:
    name: integration tests (services)
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: ontoprism
          POSTGRES_PASSWORD: ontoprism
          POSTGRES_DB: ontoprism
        ports:
          - "5433:5432"
        options: >-
          --health-cmd "pg_isready -U ontoprism"
          --health-interval 5s --health-timeout 3s --health-retries 15
    env:
      NCIT_SPARQL_URL: http://localhost:7888
      DATABASE_URL: postgresql+asyncpg://ontoprism:ontoprism@localhost:5433/ontoprism
      CADSR_DB_PATH: ${{ github.workspace }}/data/cadsr/cde_repository.db
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Oxigraph runs as a plain container (service containers can't override the
      # command it needs to `serve`).
      - name: Start Oxigraph
        run: |
          docker run -d --name oxigraph -p 7888:7878 \
            ghcr.io/oxigraph/oxigraph serve --location /data --bind 0.0.0.0:7878

      - name: Set up PDM (cached)
        uses: pdm-project/setup-pdm@973541a5febeafcfdadf8a51211435be6ecfd90f  # v4.5
        with:
          python-version: "3.13"
          cache: true

      - name: Install dependencies
        run: pdm install --dev

      # ROBOT + ELK (D28): without these on PATH the non-circular validation tests
      # (EL profile gate -> ELK classification -> promotion, #73) silently skip, and a
      # broken reasoner call looks exactly like "no candidate qualified".
      - name: Set up Java 21 (for ROBOT/ELK)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Install ROBOT
        env:
          ROBOT_VERSION: "1.9.10"
        run: |
          curl -sSL -o "$HOME/robot.jar" \
            "https://github.com/ontodev/robot/releases/download/v${ROBOT_VERSION}/robot.jar"
          printf '#!/usr/bin/env bash\nexec java -Xmx4g -jar %s/robot.jar "$@"\n' "$HOME" \
            > "$HOME/robot"
          chmod +x "$HOME/robot"
          echo "$HOME" >> "$GITHUB_PATH"

      - name: Verify ROBOT
        run: robot --version

      - name: Wait for Oxigraph
        run: |
          for i in $(seq 1 30); do
            if curl -fsS -X POST http://localhost:7888/query \
                 -H 'Content-Type: application/sparql-query' \
                 -H 'Accept: application/sparql-results+json' \
                 --data 'ASK {}' >/dev/null 2>&1; then
              echo "Oxigraph ready"; exit 0
            fi
            sleep 1
          done
          echo "Oxigraph did not become ready"; docker logs oxigraph; exit 1

      - name: Provision Postgres schema (Alembic migrations)
        run: pdm run migrate

      - name: Seed the fixture (Oxigraph graph + caDSR DB)
        run: pdm run python scripts/ci/seed_fixtures.py

      - name: Integration tests (fixture-satisfiable)
        run: pdm run test-integration-ci

  # Lightweight image-build smoke: only runs when Dockerfiles / their build inputs change.
  # CI otherwise never builds the images, so a bad FROM bump or dependency-install break
  # (e.g. a python major outside requires-python) would only surface at deploy time.
  docker-build:
    name: docker build smoke
    needs: [changes]
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Build backend image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: backend/Dockerfile
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # Single aggregate status: fails if any job failed/was cancelled; treats skipped
  # (path-filtered) jobs as OK. Use this as the branch-protection required check.
  ci-summary:
    name: CI summary
    needs: [changes, quality, backend-tests, coverage-verify, web-tests, integration-tests, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "job results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A CI job failed or was cancelled."
              exit 1
            fi
          done
          echo "All CI jobs passed or were skipped."
