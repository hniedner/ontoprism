name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Static quality gates — runs the SAME pre-commit hooks developers run locally,
  # so CI is parity, not the place issues are first discovered.
  quality:
    name: quality (pre-commit parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the fallow hook can resolve origin/main as its audit base.
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install PDM
        run: pipx install pdm

      - name: Install Python deps
        run: pdm install --dev

      - name: Install frontend deps (eslint/svelte-check hooks need node_modules)
        run: npm ci --prefix frontend

      - name: Run pre-commit (all files)
        run: pdm run pre-commit run --all-files --show-diff-on-failure

  backend-tests:
    name: backend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PDM
        run: pipx install pdm

      - name: Install dependencies
        run: pdm install --dev

      - name: Tests + coverage (excludes integration; needs no live services)
        run: pdm run test-ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  web-tests:
    name: web tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests (vitest)
        run: npm run test:unit -- --run

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e
