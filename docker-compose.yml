# ONTOPRISM development services.
#
# On this dev machine the ontology stores and Postgres are ALREADY running
# (Oxigraph NCIt :7878, Oxigraph Uberon :7879, Postgres :5432). In that case you do
# NOT need this file — point the app at the running services via .env (see .env.example).
#
# This compose file is the "fresh machine" recipe: it brings up the same three data
# services on the same ports. The `api` and `web` services are added in later
# milestones once their Dockerfiles exist.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ontoprism
      POSTGRES_PASSWORD: ontoprism
      POSTGRES_DB: ontoprism
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ontoprism"]
      interval: 5s
      timeout: 3s
      retries: 10

  oxigraph-ncit:
    image: oxigraph/oxigraph:latest
    command: ["serve", "--location", "/data", "--bind", "0.0.0.0:7878"]
    ports:
      - "7878:7878"
    volumes:
      - oxigraph_ncit:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7878/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  oxigraph-uberon:
    image: oxigraph/oxigraph:latest
    command: ["serve", "--location", "/data", "--bind", "0.0.0.0:7879"]
    ports:
      - "7879:7879"
    volumes:
      - oxigraph_uberon:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7879/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  oxigraph_ncit:
  oxigraph_uberon:
